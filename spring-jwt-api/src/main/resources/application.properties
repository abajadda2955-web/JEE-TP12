# Changement de port pour Èviter les conflits
server.port=8086

# Configuration MySQL - VÈrifiez que MySQL tourne bien
spring.datasource.url=jdbc:mysql://localhost:3306/security_jwt?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
jwt.secret=MaSuperCleSecretePourJwtAuthentication12345678901234567890
jwt.expiration=3600000

# Logging pour voir ce qui se passe
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG